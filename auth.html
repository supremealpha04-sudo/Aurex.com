<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Aurex Designs</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== AUTH PAGE STYLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16162a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: var(--shadow-glow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .auth-logo img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 2px solid var(--primary);
        }

        .auth-logo span {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .auth-tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 320px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast-success { background: rgba(16, 185, 129, 0.95); }
        .toast-error { background: rgba(239, 68, 68, 0.95); }
        .toast-warning { background: rgba(245, 158, 11, 0.95); }
        .toast-info { background: rgba(99, 102, 241, 0.95); }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <img src="IMG-20260403-WA0021(1).jpg" alt="Aurex Designs">
                    <span>Aurex Designs</span>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to access the Aurex Community</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs" id="authTabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="register">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>

                <div class="divider">or continue with</div>

                <button type="button" class="btn-google" id="googleLoginBtn">
                    <i class="fab fa-google"></i> Google Sign In
                </button>

                <div class="auth-footer">
                    Don't have an account? <a href="#" id="switchToRegister">Sign Up</a>
                </div>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="registerName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="registerEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="registerPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <select class="form-control" id="registerType">
                        <option value="free">Free Account</option>
                        <option value="premium">Premium Account (₦13,500)</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>

                <div class="divider">or continue with</div>

                <button type="button" class="btn-google" id="googleRegisterBtn">
                    <i class="fab fa-google"></i> Google Sign Up
                </button>

                <div class="auth-footer">
                    Already have an account? <a href="#" id="switchToLogin">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // AUTHENTICATION SYSTEM
        // ============================================

        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const googleRegisterBtn = document.getElementById('googleRegisterBtn');
        const toastContainer = document.getElementById('toastContainer');

        // Tab Switching
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                const target = this.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                forms.forEach(f => f.classList.remove('active'));
                document.getElementById(target + 'Form').classList.add('active');
            });
        });

        document.getElementById('switchToRegister').addEventListener('click', (e) => {
            e.preventDefault();
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
            forms.forEach(f => f.classList.remove('active'));
            document.getElementById('registerForm').classList.add('active');
        });

        document.getElementById('switchToLogin').addEventListener('click', (e) => {
            e.preventDefault();
            tabs[1].classList.remove('active');
            tabs[0].classList.add('active');
            forms.forEach(f => f.classList.remove('active'));
            document.getElementById('loginForm').classList.add('active');
        });

        // ============================================
        // TOAST SYSTEM
        // ============================================
        function showToast(message, type) {
            type = type || 'success';
            const icons = {
                success: '<i class="fas fa-check-circle"></i>',
                error: '<i class="fas fa-times-circle"></i>',
                warning: '<i class="fas fa-exclamation-triangle"></i>',
                info: '<i class="fas fa-info-circle"></i>'
            };

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `${icons[type] || icons.success} ${message}`;
            toastContainer.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('show'));

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 400);
            }, 3000);
        }

        // ============================================
        // LOADING STATE
        // ============================================
        function setLoading(button, loading) {
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Please wait...';
            } else {
                button.disabled = false;
                const icon = button.querySelector('i');
                if (icon) {
                    const text = button.textContent;
                    button.innerHTML = text.includes('Sign In') ? 
                        '<i class="fas fa-sign-in-alt"></i> Sign In' :
                        '<i class="fas fa-user-plus"></i> Create Account';
                }
            }
        }

        // ============================================
        // LOGIN
        // ============================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Please fill in all fields', 'warning');
                return;
            }

            setLoading(loginBtn, true);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                showToast('Welcome back! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'academy.html';
                }, 1500);

            } catch (error) {
                showToast(error.message || 'Login failed. Please try again.', 'error');
                setLoading(loginBtn, false);
            }
        });

        // ============================================
        // REGISTER
        // ============================================
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const userType = document.getElementById('registerType').value;

            if (!name || !email || !password) {
                showToast('Please fill in all fields', 'warning');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'warning');
                return;
            }

            setLoading(registerBtn, true);

            try {
                // Sign up user
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: name,
                            user_type: userType
                        }
                    }
                });

                if (error) throw error;

                // If premium, create subscription payment record
                if (userType === 'premium') {
                    const { error: subError } = await supabase
                        .from('subscription_payments')
                        .insert({
                            user_id: data.user.id,
                            amount: 13500,
                            payment_type: 'new_premium',
                            payment_status: 'pending'
                        });

                    if (subError) console.error('Subscription record error:', subError);

                    showToast('Premium account created! Please complete payment to activate.', 'info');
                    
                    // Show payment instructions
                    const paymentInfo = `
                        <div style="background: var(--bg-secondary); padding: 16px; border-radius: 12px; margin: 16px 0;">
                            <p><strong>Payment Instructions:</strong></p>
                            <p>Bank: Moniepoint</p>
                            <p>Account Name: Mustapha Iman Oniyangi</p>
                            <p>Account Number: 8028741731</p>
                            <p>Amount: ₦13,500</p>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">
                                After payment, click "Complete Payment" and upload your screenshot.
                            </p>
                            <button onclick="completePayment()" class="btn-primary" style="margin-top: 12px;">
                                <i class="fas fa-check"></i> Complete Payment
                            </button>
                        </div>
                    `;

                    // Show in modal or toast
                    showToast('Check your email to verify, then complete payment.', 'info');
                } else {
                    showToast('Account created successfully! Please check your email to verify.', 'success');
                }

                setLoading(registerBtn, false);

                setTimeout(() => {
                    window.location.href = 'academy.html';
                }, 2000);

            } catch (error) {
                showToast(error.message || 'Registration failed. Please try again.', 'error');
                setLoading(registerBtn, false);
            }
        });

        // ============================================
        // GOOGLE AUTH
        // ============================================
        async function handleGoogleAuth() {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/academy.html'
                    }
                });

                if (error) throw error;
            } catch (error) {
                showToast(error.message || 'Google authentication failed.', 'error');
            }
        }

        googleLoginBtn.addEventListener('click', handleGoogleAuth);
        googleRegisterBtn.addEventListener('click', handleGoogleAuth);

        // ============================================
        // PAYMENT COMPLETION
        // ============================================
        window.completePayment = function() {
            const message = encodeURIComponent(
                'Payment Completed!\n\n' +
                'Account Name: Mustapha Iman Oniyangi\n' +
                'Account Number: 8028741731\n' +
                'Bank: Moniepoint\n' +
                'Amount: ₦13,500\n\n' +
                'Please find my payment screenshot attached.\n' +
                'Thank you! 🙏'
            );
            window.open(`https://wa.me/2349127161200?text=${message}`, '_blank');
            showToast('Redirecting to WhatsApp...', 'info');
        };

        // ============================================
        // CHECK AUTH STATUS
        // ============================================
        async function checkAuthStatus() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'academy.html';
            }
        }

        // Run on page load
        checkAuthStatus();
    </script>
</body>
</html>
