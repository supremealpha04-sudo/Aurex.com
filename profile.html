<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Aurex Designs</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Profile Page Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16162a;
            --bg-glass: rgba(22, 22, 42, 0.85);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);
            --bottom-nav-height: 70px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: var(--bottom-nav-height);
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid var(--primary);
        }

        .logo span {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Profile Section */
        .profile-hero {
            padding: 120px 0 40px;
            text-align: center;
        }

        .profile-hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; }

        /* Profile Card */
        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            margin: 0 auto 16px;
            display: block;
        }

        .profile-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            text-align: center;
        }

        .profile-email {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .profile-type {
            text-align: center;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin: 8px auto 0;
        }

        .type-premium { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .type-free { background: rgba(100, 116, 139, 0.2); color: var(--text-muted); }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn-primary {
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            padding: 12px 32px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .btn-danger {
            padding: 12px 32px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            opacity: 0.8;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            height: var(--bottom-nav-height);
            padding: 0 16px;
        }

        .bottom-nav-inner {
            display: flex;
            gap: 8px;
            max-width: 500px;
            width: 100%;
            justify-content: space-around;
        }

        .bottom-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.7rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 120px;
        }

        .bottom-nav-btn i { font-size: 1.3rem; transition: all 0.3s ease; }
        .bottom-nav-btn:hover { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        .bottom-nav-btn.active { color: var(--primary); background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.1)); }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 320px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-success { background: rgba(16, 185, 129, 0.95); }
        .toast-error { background: rgba(239, 68, 68, 0.95); }
        .toast-warning { background: rgba(245, 158, 11, 0.95); }
        .toast-info { background: rgba(99, 102, 241, 0.95); }

        /* Supreme Alpha Contact */
        .supreme-contact {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .supreme-contact a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .supreme-contact a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .profile-card { padding: 24px; }
            .container { padding: 0 16px; }
            .form-actions { flex-direction: column; }
            .form-actions button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="logo">
                <img src="IMG-20260403-WA0021(1).jpg" alt="Aurex Designs">
                <span>Aurex Designs</span>
            </a>
            <button onclick="logout()" style="padding: 8px 16px; background: var(--error); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </nav>
    </header>

    <main>
        <section class="profile-hero">
            <div class="container">
                <h1>👤 <span class="text-gradient">My Profile</span></h1>
            </div>
        </section>

        <div class="container">
            <!-- Profile Card -->
            <div class="profile-card" id="profileCard">
                <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="Profile">
                <h2 id="profileName" class="profile-name">User</h2>
                <p id="profileEmail" class="profile-email">user@example.com</p>
                <div style="text-align: center;">
                    <span id="profileType" class="profile-type type-free">FREE</span>
                </div>
                <p id="profileStatus" style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">Subscription: Inactive</p>
            </div>

            <!-- Edit Profile Form -->
            <div class="profile-card">
                <h3 style="font-family: 'Space Grotesk', sans-serif; margin-bottom: 16px;">✏️ Edit Profile</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="editName" placeholder="Your full name">
                        <div class="hint">Cannot be changed after set</div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-calendar-alt"></i> Age Range</label>
                        <input type="text" id="editAge" placeholder="e.g., 18-24, 25-34, 35-44">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-image"></i> Profile Image URL</label>
                        <input type="text" id="editImage" placeholder="https://example.com/avatar.jpg">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-link"></i> Portfolio Website</label>
                        <input type="text" id="editPortfolio" placeholder="https://yourportfolio.com">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-share-alt"></i> Social Media (JSON format)</label>
                        <input type="text" id="editSocial" placeholder='{"twitter":"username","instagram":"username"}'>
                        <div class="hint">Example: {"twitter":"yourhandle","instagram":"yourhandle"}</div>
                    </div>

                    <hr class="divider">

                    <div class="form-actions">
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                        <button type="button" class="btn-danger" onclick="deleteAccount()"><i class="fas fa-trash"></i> Delete Account</button>
                    </div>
                </form>
            </div>

            <!-- Supreme Alpha Contact -->
            <div class="supreme-contact">
                <p style="color: var(--text-secondary);">
                    <i class="fas fa-code" style="color: var(--primary);"></i> 
                    Need a website? Contact Supreme-Alpha on 
                    <a href="https://wa.me/2347031924052" target="_blank">
                        <i class="fab fa-whatsapp"></i> WhatsApp: 07031924052
                    </a>
                </p>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="index.html" class="bottom-nav-btn"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="projects.html" class="bottom-nav-btn"><i class="fas fa-folder-open"></i><span>Projects</span></a>
            <a href="academy.html" class="bottom-nav-btn"><i class="fas fa-graduation-cap"></i><span>Academy</span></a>
            <a href="profile.html" class="bottom-nav-btn active"><i class="fas fa-user"></i><span>Profile</span></a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // USER PROFILE
        // ============================================

        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let userProfile = null;

        // ============================================
        // TOAST SYSTEM
        // ============================================
        function showToast(message, type) {
            type = type || 'success';
            const icons = {
                success: '<i class="fas fa-check-circle"></i>',
                error: '<i class="fas fa-times-circle"></i>',
                warning: '<i class="fas fa-exclamation-triangle"></i>',
                info: '<i class="fas fa-info-circle"></i>'
            };

            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `${icons[type] || icons.success} ${message}`;
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('show'));

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 400);
            }, 3000);
        }

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            const { data: { session }, error } = await supabase.auth.getSession();
            
            if (!session) {
                showToast('Please sign in', 'warning');
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 1500);
                return false;
            }

            currentUser = session.user;
            await loadProfile();
            return true;
        }

        // ============================================
        // LOAD PROFILE
        // ============================================
        async function loadProfile() {
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('auth_id', currentUser.id)
                    .single();

                if (error) throw error;

                userProfile = data;
                updateUI();

            } catch (error) {
                console.error('Error loading profile:', error);
                showToast('Error loading profile', 'error');
            }
        }

        // ============================================
        // UPDATE UI
        // ============================================
        function updateUI() {
            if (!userProfile) return;

            document.getElementById('profileName').textContent = userProfile.full_name || 'User';
            document.getElementById('profileEmail').textContent = userProfile.email || 'No email';
            document.getElementById('profileAvatar').src = userProfile.profile_image || 
                `https://ui-avatars.com/api/?name=${encodeURIComponent(userProfile.full_name || 'User')}&background=6366f1&color=fff`;

            // Type badge
            const typeBadge = document.getElementById('profileType');
            if (userProfile.user_type === 'premium' && userProfile.subscription_status === 'active') {
                typeBadge.textContent = '⭐ PREMIUM';
                typeBadge.className = 'profile-type type-premium';
                document.getElementById('profileStatus').textContent = 'Subscription: Active ✅';
            } else {
                typeBadge.textContent = '🆓 FREE';
                typeBadge.className = 'profile-type type-free';
                document.getElementById('profileStatus').textContent = 'Subscription: Inactive';
            }

            // Fill form fields
            document.getElementById('editName').value = userProfile.full_name || '';
            document.getElementById('editAge').value = userProfile.age_range || '';
            document.getElementById('editImage').value = userProfile.profile_image || '';
            document.getElementById('editPortfolio').value = userProfile.portfolio_website || '';
            document.getElementById('editSocial').value = userProfile.social_media ? 
                JSON.stringify(userProfile.social_media) : '{}';
        }

        // ============================================
        // UPDATE PROFILE
        // ============================================
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get social media as JSON
            let socialMedia = {};
            try {
                socialMedia = JSON.parse(document.getElementById('editSocial').value);
            } catch (e) {
                showToast('Invalid social media JSON format', 'error');
                return;
            }

            const updates = {
                age_range: document.getElementById('editAge').value,
                profile_image: document.getElementById('editImage').value,
                portfolio_website: document.getElementById('editPortfolio').value,
                social_media: socialMedia,
                updated_at: new Date().toISOString()
            };

            try {
                const { error } = await supabase
                    .from('users')
                    .update(updates)
                    .eq('id', userProfile.id);

                if (error) throw error;

                showToast('Profile updated successfully!', 'success');
                await loadProfile();

            } catch (error) {
                showToast('Error updating profile: ' + error.message, 'error');
            }
        });

        // ============================================
        // DELETE ACCOUNT
        // ============================================
        async function deleteAccount() {
            if (!confirm('Are you sure you want to delete your account? This action cannot be undone!')) return;
            if (!confirm('All your data will be permanently removed. Continue?')) return;

            try {
                // Delete from users table (cascade will handle related data)
                const { error } = await supabase
                    .from('users')
                    .delete()
                    .eq('id', userProfile.id);

                if (error) throw error;

                // Sign out
                await supabase.auth.signOut();
                showToast('Account deleted successfully', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                showToast('Error deleting account: ' + error.message, 'error');
            }
        }

        // ============================================
        // LOGOUT
        // ============================================
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'auth.html';
        }

        // ============================================
        // INITIALIZE
        // ============================================
        checkAuth();
    </script>
</body>
</html>
