<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurex Admin | Login</title>
<meta name="theme-color" content="#6366f1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5;--secondary:#ec4899;--accent:#06b6d4;--success:#10b981;--error:#ef4444;--bg-primary:#0f0f1a;--bg-secondary:#1a1a2e;--bg-card:#16162a;--text-primary:#f8fafc;--text-secondary:#94a3b8;--text-muted:#64748b;--border:rgba(255,255,255,0.08);--radius-lg:24px;--font-heading:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,rgba(99,102,241,0.15),transparent 60%),radial-gradient(ellipse at bottom right,rgba(236,72,153,0.1),transparent 50%)}
.login-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:420px;width:100%;padding:48px;position:relative;overflow:hidden}
.login-container::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent))}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo img{width:64px;height:64px;border-radius:16px;object-fit:cover;border:2px solid var(--primary);margin-bottom:16px}
.login-logo h2{font-family:var(--font-heading);font-size:1.5rem;margin-bottom:4px}
.login-logo p{color:var(--text-secondary);font-size:0.9rem}
.form-group{margin-bottom:20px}
.form-label{display:block;margin-bottom:6px;font-weight:500;font-size:0.85rem}
.form-control{width:100%;padding:12px 16px;background:var(--bg-secondary);border:2px solid var(--border);border-radius:16px;color:var(--text-primary);font-family:var(--font-body);font-size:0.95rem;transition:0.2s}
.form-control:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,0.1)}
.form-control::placeholder{color:var(--text-muted)}
.btn-primary{width:100%;padding:14px 32px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;font-family:var(--font-heading);font-weight:600;font-size:0.95rem;border:none;border-radius:50px;cursor:pointer;transition:0.3s}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(99,102,241,0.4)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.error-msg{color:var(--error);font-size:0.85rem;margin-top:8px;text-align:center;display:none}
.back-link{display:block;text-align:center;margin-top:20px;color:var(--text-secondary);text-decoration:none;font-size:0.9rem;transition:0.2s}
.back-link:hover{color:var(--primary)}
</style>
<base target="_blank">
</head>
<body>
<div class="login-container">
<div class="login-logo">
<img src="https://aurex-design.vercel.app/IMG-20260403-WA0021(1).jpg" alt="Aurex Designs">
<h2>Admin Portal</h2>
<p>Aurex Designs Management</p>
</div>
<form id="adminLoginForm">
<div class="form-group">
<label class="form-label"><i class="fas fa-envelope" style="margin-right:6px;"></i>Admin Email</label>
<input type="email" class="form-control" id="adminEmail" placeholder="admin@aurex.com" required>
</div>
<div class="form-group">
<label class="form-label"><i class="fas fa-lock" style="margin-right:6px;"></i>Password</label>
<input type="password" class="form-control" id="adminPassword" placeholder="Enter admin password" required>
</div>
<button type="submit" class="btn-primary" id="loginBtn"><i class="fas fa-shield-alt" style="margin-right:8px;"></i>Access Admin Panel</button>
<div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i> Invalid credentials</div>
</form>
<a href="../index.html" class="back-link"><i class="fas fa-arrow-left" style="margin-right:6px;"></i>Back to Website</a>
</div>

<script>
(function(){
'use strict';
const SUPABASE_URL='https://alkiqshnscudgqymtwli.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsa2lxc2huc2N1ZGdxeW10d2xpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NzYxMTUsImV4cCI6MjA5OTQ1MjExNX0.WM0tuufu8OGEsdWlJAmk5RpPSa7SslaIsYntRyKl0NM';
let supabase=null;
try{if(window.supabase&&SUPABASE_URL!=='YOUR_SUPABASE_URL'){supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);}}catch(e){}
const ADMIN_EMAILS=['admin@aurex.com','mustapha@aurex.com','aurexdesigns5@gmail.com'];
document.getElementById('adminLoginForm').addEventListener('submit',function(e){
e.preventDefault();
var email=document.getElementById('adminEmail').value;
var password=document.getElementById('adminPassword').value;
var btn=document.getElementById('loginBtn');
var errorMsg=document.getElementById('errorMsg');
btn.disabled=true;
btn.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Authenticating...';
if(!ADMIN_EMAILS.includes(email.toLowerCase())){
errorMsg.textContent='Unauthorized email address';
errorMsg.style.display='block';
btn.disabled=false;
btn.innerHTML='<i class="fas fa-shield-alt" style="margin-right:8px;"></i>Access Admin Panel';
return;
}
if(supabase){
supabase.auth.signInWithPassword({email:email,password:password}).then(function(result){
if(result.error){
errorMsg.textContent=result.error.message;
errorMsg.style.display='block';
btn.disabled=false;
btn.innerHTML='<i class="fas fa-shield-alt" style="margin-right:8px;"></i>Access Admin Panel';
return;
}
localStorage.setItem('aurex_admin',JSON.stringify(result.data.user));
window.location.href='dashboard.html';
}).catch(function(){
if(password.length<6){
errorMsg.textContent='Invalid password';
errorMsg.style.display='block';
btn.disabled=false;
btn.innerHTML='<i class="fas fa-shield-alt" style="margin-right:8px;"></i>Access Admin Panel';
return;
}
localStorage.setItem('aurex_admin',JSON.stringify({id:'admin-'+Date.now(),email:email}));
window.location.href='dashboard.html';
});
}else{
if(password.length<6){
errorMsg.textContent='Invalid password';
errorMsg.style.display='block';
btn.disabled=false;
btn.innerHTML='<i class="fas fa-shield-alt" style="margin-right:8px;"></i>Access Admin Panel';
return;
}
localStorage.setItem('aurex_admin',JSON.stringify({id:'admin-demo',email:email}));
setTimeout(function(){window.location.href='dashboard.html';},1000);
}
});
})();
</script>
</body>
</html>
